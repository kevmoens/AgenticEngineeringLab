name: Deploy Blazor WASM to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Publish Blazor app
        run: dotnet publish ./src/AgenticEngineeringLab/AgenticEngineeringLab.csproj -c Release -o ./artifacts/github-pages

      - name: Configure GitHub Pages output
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            BASE_HREF="/"
          else
            BASE_HREF="/$REPO_NAME/"
          fi

          sed -i "s#<base href=\"/\" />#<base href=\"$BASE_HREF\" />#g" ./artifacts/github-pages/wwwroot/index.html
          cp ./artifacts/github-pages/wwwroot/index.html ./artifacts/github-pages/wwwroot/404.html
          touch ./artifacts/github-pages/wwwroot/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./artifacts/github-pages/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
